<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">RSS агрегатор</h1>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <!-- Контейнер для сообщений -->
          <div class="feedback mb-2" id="messages-container"></div>

          <form id="rss-form" class="mb-3">
            <div class="mb-3">
              <label for="rss-input" class="form-label"></label>
              <div class="input-group">
                <input
                  id="rss-input"
                  class="form-control"
                  placeholder="Ссылка RSS"
                  aria-label="url"
                />
                <button class="btn btn-primary" type="submit"></button>
              </div>
            </div>
            <div class="text-muted mb-2 small"></div>
          </form>

          <!-- Ряд с двумя колонками для фидов и постов -->
          <div class="row">
            <div class="col-md-6">
              <h2 data-i18n="sections.feeds">Фиды</h2>
              <div id="feeds" class="list-group feeds"></div>
            </div>
            <div class="col-md-6">
              <h2 data-i18n="sections.posts">Посты</h2>
              <!-- Добавить заголовок постов -->
              <div id="posts-container" class="posts"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ШАБЛОНЫ (скрыты, не отображаются) -->
    <template id="feed-template">
      <a href="#" class="list-group-item list-group-item-action feed-item">
        <div class="d-flex justify-content-between align-items-center">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center mb-1">
              <i class="fas fa-rss text-warning me-2"></i>
              <!-- Сюда будет вставлен h3 вместо span -->
            </div>
            <p class="feed-description text-muted small mb-2"></p>
            <div class="feed-meta ms-4">
              <i class="fas fa-calendar-alt me-1"></i>
              <span class="feed-date"></span>
              <i class="fas fa-file-text ms-3 me-1"></i>
              <span class="feed-posts-count">0</span>
            </div>
          </div>
        </div>
      </a>
    </template>

    <template id="post-template">
      <li class="list-group-item d-flex justify-content-between align-items-start">
        <a href="#" class="flex-grow-1" target="_blank" rel="noopener noreferrer">
          <div class="d-flex w-100 justify-content-between">
            <h6 class="mb-1 post-title"></h6>
            <small class="text-muted post-date"></small>
          </div>
          <p class="mb-1 text-muted small post-description"></p>
        </a>
        <button type="button" class="btn btn-sm btn-outline-primary preview-btn">Просмотр</button>
      </li>
    </template>

    <template id="posts-header-template">
      <div class="list-group posts-list"></div>
    </template>

    <!-- Модальное окно для предпросмотра постов -->
    <div class="modal fade" id="modal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="post-description"></p>
          </div>
          <div class="modal-footer">
            <a href="#" class="btn btn-primary" target="_blank"></a>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
