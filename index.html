<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">RSS агрегатор</h1>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <!-- Контейнер для сообщений (только ОДИН!) -->
          <div id="messages-container" class="mb-2"></div>

          <form id="rss-form" class="mb-3">
            <div class="input-group">
              <input
                id="rss-input"
                class="form-control"
                placeholder="Ссылка RSS"
                aria-label="RSS URL"
              />
              <button class="btn btn-primary" type="submit">Добавить</button>
            </div>
            <div class="text-muted mb-2 small">
              Пример: https://lenta.ru/rss
            </div>
          </form>

          <div id="feeds" class="list-group"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
