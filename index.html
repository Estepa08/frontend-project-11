<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="container mt-5 grid">
      <h1 class="text-center mb-4">RSS агрегатор</h1>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <!-- Карточка для формы -->
          <div class="card mb-4">
            <div class="card-body">
              <form id="rss-form">
                <div class="mb-3">
                  <label for="rss-input" class="form-label fw-bold">
                    <i class="fas fa-link me-2 text-primary"></i>
                    Введите URL RSS ленты
                  </label>
                  <div class="input-group">
                    <input
                      id="rss-input"
                      type="url"
                      class="form-control form-control-lg"
                      placeholder="https://example.com/rss"
                      aria-label="RSS URL"
                    />
                    <button
                      class="btn btn-primary btn-lg"
                      type="submit"
                      id="submit-btn"
                    >
                      <i class="fas fa-plus-circle me-2"></i>
                      Добавить
                    </button>
                  </div>
                </div>
              </form>

              <!-- Контейнер для сообщений -->
              <div id="messages-container" class="mt-2"></div>

              <!-- Пример подсказка -->
              <div class="mt-2 small text-secondary">
                <i class="fas fa-lightbulb me-1 text-warning"></i>
                Пример:
                <span class="badge bg-light text-dark me-1"
                  >https://lenta.ru/rss</span
                >
              </div>
            </div>
          </div>

          <!-- Список фидов -->
          <div id="feeds" class="list-group"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
